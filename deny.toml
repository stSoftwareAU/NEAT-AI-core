# cargo-deny — same policy family as NEAT-AI-Discovery.
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check

[graph]
targets = []
all-features = true

[licenses]
# Same broad allow-list as Discovery; quiet "license not encountered" noise on small graphs.
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "lowest-version"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
