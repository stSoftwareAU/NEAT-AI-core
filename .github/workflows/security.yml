name: Security Reusable Workflow

on:
  workflow_call:
    inputs:
      include-dependency-review:
        description: "Include dependency review"
        required: false
        type: boolean
        default: true

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Pull latest (after version/dependency bot commits)
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git pull --ff-only origin "$HEAD_REF" || true

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install cargo-audit
        # taiki-e/install-action@v2.79.2
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d
        with:
          tool: cargo-audit

      # Primary audit: rustsec/audit-check@v2 annotates PRs with RustSec advisories.
      # It wraps the `cargo audit` CLI (cargo-audit) and reports vulnerabilities inline.
      - name: Run RustSec audit (rustsec/audit-check)
        # rustsec/audit-check@master (post-v2.0.0, node24)
        uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: run `cargo audit` directly so the job fails even if the action
      # cannot post annotations (e.g. permission edge cases on forked PRs).
      - name: Run cargo audit (fallback)
        run: cargo audit

      - name: Dependency review (GitHub Advisory / license diff on PR)
        if: ${{ inputs.include-dependency-review && github.event_name == 'pull_request' }}
        # actions/dependency-review-action@v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          comment-summary-in-pr: always
