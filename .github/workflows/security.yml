name: Security Reusable Workflow

on:
  workflow_call:
    inputs:
      include-dependency-review:
        description: "Include dependency review"
        required: false
        type: boolean
        default: true

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Pull latest (after version/dependency bot commits)
        run: git pull --ff-only origin "${{ github.head_ref }}" || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Primary audit: rustsec/audit-check@v2 annotates PRs with RustSec advisories.
      # It wraps the `cargo audit` CLI (cargo-audit) and reports vulnerabilities inline.
      - name: Run RustSec audit (rustsec/audit-check)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback: run `cargo audit` directly so the job fails even if the action
      # cannot post annotations (e.g. permission edge cases on forked PRs).
      - name: Run cargo audit (fallback)
        run: cargo audit

      - name: Dependency review (GitHub Advisory / license diff on PR)
        if: ${{ inputs.include-dependency-review && github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
