# Weekly dependency bumps (same idea as NEAT-AI-Discovery).
name: Upgrade Cargo Dependencies

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    name: Upgrade dependencies and create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: Develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install cargo-audit (required by bump-deps.sh)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Add wasm32 target (required by bump-deps.sh dual build)
        run: rustup target add wasm32-unknown-unknown

      - name: Refresh dependencies via bump-deps.sh (quarantine-aware)
        env:
          # Crates.io versions younger than this many hours are deferred —
          # the quarantine window closed in Issue #76.
          VIBE_BUMP_QUARANTINE_HOURS: ${{ vars.VIBE_BUMP_QUARANTINE_HOURS || '24' }}
        run: |
          # bump-deps.sh applies the release-age quarantine, then runs
          # cargo audit + dual native/wasm builds. A non-zero exit means the
          # bump is unsafe; the worker reverts per the contract.
          ./bump-deps.sh --quarantine-hours "${VIBE_BUMP_QUARANTINE_HOURS}" \
            2>&1 | tee upgrade.log

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- 'Cargo.toml' '**/Cargo.toml' 'Cargo.lock'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml / Cargo.lock dependency changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- 'Cargo.toml' '**/Cargo.toml' 'Cargo.lock'
          fi

      - name: Build summary
        if: steps.changes.outputs.changed == 'true'
        id: summary
        run: |
          {
            echo 'body<<EOF'
            echo '## Dependency Upgrades'
            echo ''
            echo 'Bumps applied via `bump-deps.sh` honour the'
            echo '`VIBE_BUMP_QUARANTINE_HOURS` release-age quarantine'
            echo 'and have passed `cargo audit` plus dual native/wasm builds.'
            echo ''
            echo '### bump-deps.sh log'
            echo '```'
            cat upgrade.log
            echo '```'
            echo ''
            echo 'This PR was automatically generated by the scheduled dependency upgrade workflow.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        # peter-evans/create-pull-request@v7.0.11
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/upgrade-dependencies
          base: Develop
          title: "chore: upgrade Cargo dependencies to latest compatible versions"
          body: ${{ steps.summary.outputs.body }}
          commit-message: "chore: upgrade Cargo.toml dependencies to latest compatible versions"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          delete-branch: true
