# Weekly dependency bumps (same idea as NEAT-AI-Discovery).
name: Upgrade Cargo Dependencies

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    name: Upgrade dependencies and create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          ref: Develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Upgrade dependencies
        run: |
          cargo upgrade --dry-run 2>&1 | tee upgrade-dry-run.txt || true
          cargo upgrade 2>&1 | tee upgrade.log || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- 'Cargo.toml' '**/Cargo.toml' 'Cargo.lock'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml / Cargo.lock dependency changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- 'Cargo.toml' '**/Cargo.toml' 'Cargo.lock'
          fi

      - name: Update Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        run: cargo update

      - name: Build summary
        if: steps.changes.outputs.changed == 'true'
        id: summary
        run: |
          {
            echo 'body<<EOF'
            echo '## Dependency Upgrades'
            echo ''
            echo '### Changes'
            echo '```'
            cat upgrade-dry-run.txt
            echo '```'
            echo ''
            echo 'This PR was automatically generated by the scheduled dependency upgrade workflow.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/upgrade-dependencies
          base: Develop
          title: "chore: upgrade Cargo dependencies to latest compatible versions"
          body: ${{ steps.summary.outputs.body }}
          commit-message: "chore: upgrade Cargo.toml dependencies to latest compatible versions"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          delete-branch: true
