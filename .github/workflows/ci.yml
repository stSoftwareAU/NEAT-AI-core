# NEAT-AI-Discovery–style PR pipeline: auto patch version + rustfmt push, then strict checks.
# Requires repository secret ACTIONS_PUSH (PAT with contents:write on this repo) so bots can
# push to PR branches; default GITHUB_TOKEN alone is often insufficient.
name: CI

on:
  push:
    branches:
      - Develop
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - Develop
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  version-increment:
    name: Auto-increment Versions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PUSH }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: git pull origin ${{ github.head_ref }}

      - name: Fetch base branch
        run: |
          git fetch origin Develop:Develop || git fetch origin develop:develop || true

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Install cargo-edit and cargo-outdated
        # taiki-e/install-action@v2.79.2
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d
        with:
          tool: cargo-edit,cargo-outdated

      - name: Bump crate version (if needed) and upgrade dependencies
        run: |
          set -euo pipefail
          BASE_BRANCH="Develop"
          if ! git show-ref --verify --quiet refs/remotes/origin/Develop; then
            BASE_BRANCH="develop"
          fi

          SKIP_VERSION_BUMP=false
          if git show-ref --verify --quiet refs/remotes/origin/$BASE_BRANCH; then
            VERSION_COMMIT_COUNT=$(git log --oneline origin/$BASE_BRANCH..HEAD --grep="chore: auto-increment versions for changed projects" | wc -l | tr -d ' ')
            if [ "${VERSION_COMMIT_COUNT:-0}" -gt 0 ]; then
              echo "Version bump commit already on this PR — skipping semver bump only"
              SKIP_VERSION_BUMP=true
            fi
          fi

          if [ "$SKIP_VERSION_BUMP" = false ] && git show-ref --verify --quiet refs/remotes/origin/$BASE_BRANCH; then
            BASE_VERSION=$(git show origin/$BASE_BRANCH:Cargo.toml 2>/dev/null | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "")
            CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ -n "$BASE_VERSION" ] && [ -n "$CURRENT_VERSION" ] && [ "$CURRENT_VERSION" != "$BASE_VERSION" ]; then
              echo "Version already differs from base — skipping semver bump"
              SKIP_VERSION_BUMP=true
            fi
          fi

          if [ "$SKIP_VERSION_BUMP" = false ]; then
            CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "Current crate version: $CURRENT_VERSION"
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}
            NEW_VERSION="$major.$minor.$((patch + 1))"
            echo "Bumping crate version to: $NEW_VERSION"
            ESCAPED_CURRENT=$(printf '%s' "$CURRENT_VERSION" | sed 's/[\/.^$*+?()[\]{}|]/\\&/g')
            sed -i.bak "s/^version = \"$ESCAPED_CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml
            rm -f Cargo.toml.bak
          fi

          echo "Running cargo upgrade --incompatible and cargo update (NEAT-AI-Discovery quality.sh parity)..."
          cargo upgrade --incompatible
          cargo update
          cargo outdated -R || true

      - name: Commit version and dependency changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes after version bump / dependency upgrade"
          else
            git commit -m "chore: auto-increment versions for changed projects"
            git push origin ${{ github.head_ref }}
          fi

  auto-format:
    name: Auto-format Code
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [version-increment]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PUSH }}

      - name: Ensure bash scripts are executable
        run: |
          CHANGED=false
          while IFS= read -r script; do
            if [ ! -x "$script" ]; then
              chmod +x "$script"
              CHANGED=true
            fi
          done < <(find . -name "*.sh" -not -path "./target/*" -not -path "./.git/*")
          if [ "$CHANGED" = true ]; then
            echo "chmod +x applied to scripts"
          fi

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Format code
        run: cargo fmt --all

      - name: Commit rustfmt if needed
        id: fmt_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: apply rustfmt fixes"
            git push origin ${{ github.head_ref }}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [version-increment, auto-format]
    env:
      RUSTFLAGS: "-D warnings"

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest changes
        run: git pull origin ${{ github.head_ref }}

      - name: Free up runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/share/swift
          df -h /

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Rust cache
        # Swatinem/rust-cache@v2.9.1
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: ". -> target"

      - name: Install cargo-deny
        # taiki-e/install-action@v2.79.2
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d
        with:
          tool: cargo-deny

      - name: cargo deny
        run: cargo deny check

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Clippy compiles the workspace; skip redundant cargo check / cargo build here.
      - name: Run linter
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --lib --tests --all-features -- --test-threads=2

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  scripts-and-spelling:
    name: Scripts & spelling
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [version-increment]

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      # ShellCheck Lint — upstream project: https://github.com/koalaman/shellcheck
      # We install the apt package (which ships koalaman/shellcheck) and scan all *.sh files
      # under the repository, mirroring the local quality.sh gate.
      - name: Install shellcheck (koalaman/shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run shellcheck (koalaman/shellcheck)
        run: |
          failed=0
          while IFS= read -r script; do
            shellcheck -s bash "$script" || failed=1
          done < <(find . -name "*.sh" -not -path "./target/*" -not -path "./.git/*")
          exit "$failed"

      - name: Check bash script syntax (bash -n)
        run: |
          exit_code=0
          while IFS= read -r script; do
            bash -n "$script" || exit_code=1
          done < <(find . -name "*.sh" -not -path "./target/*" -not -path "./.git/*")
          exit "$exit_code"

      - name: Run codespell
        # codespell-project/actions-codespell@v2.2
        uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579
        with:
          check_filenames: true
          check_hidden: true
          skip: "./target,./.git"
          ignore_words_list: renderD,mape

  security:
    uses: ./.github/workflows/security.yml
    if: github.event_name == 'pull_request'
    needs: [version-increment]
    with:
      include-dependency-review: true

  validation:
    name: Project Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [version-increment]

    steps:
      - name: Checkout code
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Check for required files
        run: |
          required_files=(
            "Cargo.toml"
            "README.md"
            "LICENSE"
            "neat-core/src/lib.rs"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing: $file"
              exit 1
            fi
          done

      - name: Validate Cargo workspace manifest
        run: cargo metadata --no-deps --format-version 1 > /dev/null

      - name: Validate workspace.package in root Cargo.toml
        run: |
          for field in version edition license; do
            if ! grep -vE '^[[:space:]]*#' Cargo.toml | grep -qE "^[[:space:]]*${field}[[:space:]]*="; then
              echo "Missing workspace.package field '${field}' in root Cargo.toml"
              exit 1
            fi
          done
          grep -qE '^\[workspace\]' Cargo.toml || { echo "Missing [workspace]"; exit 1; }
          grep -q 'members' Cargo.toml || { echo "Missing workspace members"; exit 1; }

      - name: Validate neat-core Cargo.toml
        run: |
          for field in name version edition license; do
            if ! grep -vE '^[[:space:]]*#' neat-core/Cargo.toml | grep -qE "^[[:space:]]*${field}"; then
              echo "Missing '${field}' in neat-core/Cargo.toml"
              exit 1
            fi
          done

      - name: Check README length
        run: |
          readme_lines=$(wc -l < README.md)
          if [ "$readme_lines" -lt 10 ]; then
            echo "README.md too short ($readme_lines lines)"
            exit 1
          fi

      - name: Check neat-core rustdoc presence
        run: |
          doc_comments=$(grep -c "///" neat-core/src/lib.rs || echo "0")
          if [ "$doc_comments" -eq 0 ]; then
            echo "No /// in neat-core/src/lib.rs"
            exit 1
          fi

